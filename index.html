<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bảng Xếp Số</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container" id="app">
    <!-- tiêu đề chớp -->
    <div class="header-title">Bảng Xếp Số</div>

    <!-- khung board xanh dương ngọc viền trắng -->
    <div class="board-wrapper">
      <div class="grid" id="gridContainer"></div>
    </div>

    <!-- nút xếp số và hỗ trợ -->
    <div class="action-area">
      <div class="button-group">
        <button class="btn-shuffle" id="shuffleBtn">Xếp Số</button>
        <button class="btn-support" id="supportBtn">Hỗ Trợ</button>
        <button class="btn-music" id="musicBtn">🔊</button>
      </div>
    </div>

    <!-- footer -->
    <div class="footer">
      <span>Thiết Kế Trần Cường - Zalo: 0907860662</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
