<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Bảng Xếp Số</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Bong bóng bên ngoài -->
  <div class="bubbles-outer">
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
    <div class="bubble-outer"></div>
  </div>

  <div class="app-container" id="app">
    <!-- Bong bóng bên trong -->
    <div class="bubbles-inner">
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
      <div class="bubble-inner"></div>
    </div>

    <!-- tiêu đề chớp -->
    <div class="header-title">Bảng Xếp Số</div>

    <!-- khung board xanh dương ngọc viền trắng -->
    <div class="board-wrapper">
      <div class="grid" id="gridContainer"></div>
    </div>

    <!-- nút xếp số, hình mẫu và nhạc -->
    <div class="action-area">
      <div class="button-group">
        <button class="btn-shuffle" id="shuffleBtn">✿ ĐẢO SỐ ✿</button>
        <button class="btn-guide" id="guideBtn">📖 Hình Mẫu</button>
        <button class="btn-music" id="musicBtn">🔊</button>
      </div>
    </div>

    <!-- footer -->
    <div class="footer">
      <span>Thiết Kế Trần Cường - Zalo: 0907860662</span>
    </div>
  </div>

  <!-- Overlay hiển thị ảnh hướng dẫn -->
  <div class="guide-overlay" id="guideOverlay">
    <div class="guide-content">
      <img src="HuongDan.jpg" alt="Hướng dẫn" id="guideImage">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
